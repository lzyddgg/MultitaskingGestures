name: build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install prerequisites
        run: |
          sudo apt update
          sudo apt install -y bash curl sudo xz-utils dpkg-dev make perl git clang

      - name: install theos
        run: |
          unset THEOS
          rm -rf "$GITHUB_WORKSPACE/theos"
          export THEOS="$HOME/theos"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"
          ls -la "$HOME/theos"
          ls -la "$HOME/theos/toolchain/linux/iphone/bin" || true
          ls -la "$HOME/theos/sdks" || true

      - name: patch for ios7 arm
        run: |
          cat > Makefile <<'EOF'
          TARGET = iphone:clang:latest:7.0
          ARCHS = armv7 armv7s
          GO_EASY_ON_ME = 1

          include $(THEOS)/makefiles/common.mk

          TWEAK_NAME = MultitaskingGestures

          MultitaskingGestures_FILES = GestureSupport.xm OffscreenSwipeRecognizers.xm MoveControlCenter.xm SwitchApp.xm SwipeUp.xm Preferences.m
          MultitaskingGestures_FRAMEWORKS = Foundation UIKit CoreGraphics QuartzCore
          MultitaskingGestures_PRIVATE_FRAMEWORKS = BackBoardServices
          MultitaskingGestures_LDFLAGS += -lMobileGestalt
          MultitaskingGestures_CFLAGS += -IHeaders

          include $(THEOS_MAKE_PATH)/tweak.mk

          SUBPROJECTS += MultitaskingGesturesSettings
          include $(THEOS_MAKE_PATH)/aggregate.mk
          EOF

          cat > MultitaskingGesturesSettings/Makefile <<'EOF'
          TARGET = iphone:clang:latest:7.0
          ARCHS = armv7 armv7s
          GO_EASY_ON_ME = 1

          include $(THEOS)/makefiles/common.mk

          BUNDLE_NAME = MultitaskingGesturesSettings

          MultitaskingGesturesSettings_FILES = MultitaskingGesturesSettings.mm
          MultitaskingGesturesSettings_INSTALL_PATH = /Library/PreferenceBundles
          MultitaskingGesturesSettings_FRAMEWORKS = Foundation UIKit
          MultitaskingGesturesSettings_PRIVATE_FRAMEWORKS = Preferences

          include $(THEOS_MAKE_PATH)/bundle.mk
          EOF

          python3 - <<'PY'
          from pathlib import Path
          import re

          # 1) BackBoardServices.h 补 Foundation
          p = Path("Headers/BackBoardServices.h")
          s = p.read_text()
          if "#import <Foundation/Foundation.h>" not in s:
              s = '#import <Foundation/Foundation.h>\n' + s
          p.write_text(s)

          # 2) OffscreenSwipeRecognizers.xm: initWithType:2 -> 强转
          p = Path("OffscreenSwipeRecognizers.xm")
          s = p.read_text()
          s = s.replace(
              "initWithType:2",
              "initWithType:(UIScreenEdgePanRecognizerType)2"
          )
          p.write_text(s)

          # 3) MoveControlCenter.xm 顶部补私有方法声明
          p = Path("MoveControlCenter.xm")
          s = p.read_text()

          block1 = """@interface _UIBackdropView : UIView
          - (id)initWithPrivateStyle:(NSInteger)style;
          - (void)setGroupName:(NSString *)name;
          @end

          @interface SBControlCenterController : NSObject
          - (void)setInGrabberOnlyMode:(BOOL)arg1;
          - (void)_beginPresentation;
          - (BOOL)isFullyRevealed;
          - (void)setTransitioning:(BOOL)arg1;
          - (CGFloat)_yValueForOpen;
          - (void)_revealSlidingViewToHeight:(CGFloat)arg1;
          - (void)_finishPresenting:(BOOL)arg1 completion:(id)arg2;
          - (void)hideGrabberAnimated:(BOOL)arg1;
          - (BOOL)isPresented;
          - (BOOL)isTransitioning;
          @end

          """

          if "@interface SBControlCenterController : NSObject" not in s:
              if "#import" in s:
                  lines = s.splitlines(True)
                  insert_at = 0
                  for i, line in enumerate(lines):
                      if line.startswith("#import"):
                          insert_at = i + 1
                  lines.insert(insert_at, "\n" + block1)
                  s = "".join(lines)
              else:
                  s = block1 + s

          p.write_text(s)
          PY

          echo "----- Makefile -----"
          cat Makefile
          echo "----- MultitaskingGesturesSettings/Makefile -----"
          cat MultitaskingGesturesSettings/Makefile
          echo "----- Headers/BackBoardServices.h -----"
          cat Headers/BackBoardServices.h
          echo "----- grep initWithType in OffscreenSwipeRecognizers.xm -----"
          grep -n "initWithType" OffscreenSwipeRecognizers.xm || true
          echo "----- grep SBControlCenterController in MoveControlCenter.xm -----"
          grep -n "SBControlCenterController" MoveControlCenter.xm || true
          
      - name: build
        run: |
          export THEOS="$HOME/theos"
          make clean package FINALPACKAGE=1 messages=yes

      - name: upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/*.deb
          if-no-files-found: error
