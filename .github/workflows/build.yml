name: build-ios7-arm

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites
        run: |
          sudo apt update
          sudo apt install -y \
            bash \
            curl \
            sudo \
            xz-utils \
            dpkg-dev \
            make \
            perl \
            git \
            clang \
            file \
            tar \
            unzip

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"

      - name: Show environment
        run: |
          echo "THEOS=$THEOS"
          uname -a
          clang --version || true
          make --version || true
          ls -la "$THEOS" || true
          ls -la "$THEOS/toolchain" || true
          ls -la "$THEOS/toolchain/linux/iphone/bin" || true
          ls -la "$THEOS/sdks" || true

      - name: Patch project for iOS 7 armv7 build
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [Path("Makefile"), Path("MultitaskingGesturesSettings/Makefile")]

          for p in files:
              s = p.read_text()

              # 规范成多行，避免原仓库 Makefile 被压成一行时不好 patch
              s = s.replace(" GO_EASY_ON_ME = 1 ", "\nGO_EASY_ON_ME = 1\n")
              s = s.replace(" include theos/makefiles/common.mk ", "\ninclude theos/makefiles/common.mk\n")
              s = s.replace(" include $(THEOS_MAKE_PATH)/tweak.mk ", "\ninclude $(THEOS_MAKE_PATH)/tweak.mk\n")
              s = s.replace(" include $(THEOS_MAKE_PATH)/bundle.mk ", "\ninclude $(THEOS_MAKE_PATH)/bundle.mk\n")
              s = s.replace(" include $(THEOS_MAKE_PATH)/aggregate.mk ", "\ninclude $(THEOS_MAKE_PATH)/aggregate.mk\n")
              s = s.replace(" SUBPROJECTS += multitaskinggesturessettings ", "\nSUBPROJECTS += multitaskinggesturessettings\n")

              # 强制改成 iOS 7 32-bit 优先
              s = s.replace("ARCHS = arm64 armv7s armv7", "ARCHS = armv7 armv7s")
              s = s.replace("ARCHS := arm64 armv7s armv7", "ARCHS := armv7 armv7s")

              lines = [line.rstrip() for line in s.splitlines() if line.strip() != ""]

              # 去掉已有 TARGET，避免重复冲突
              lines = [line for line in lines if not line.startswith("TARGET") and not line.startswith("TARGET :=")]

              # 在顶部插入更明确的 target
              lines.insert(0, "TARGET := iphone:clang:7.0:7.0")

              p.write_text("\n".join(lines) + "\n")
          PY

          echo "----- Patched root Makefile -----"
          cat Makefile
          echo "----- Patched subproject Makefile -----"
          cat MultitaskingGesturesSettings/Makefile

      - name: Patch control metadata
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("control")
          s = p.read_text()

          # 尽量保持老包风格，只修正一些更稳妥的字段
          if "Architecture:" in s:
              import re
              s = re.sub(r"Architecture:\s*\S+", "Architecture: iphoneos-arm", s)
          else:
              s += "\nArchitecture: iphoneos-arm\n"

          if "Depends:" in s:
              import re
              s = re.sub(r"Depends:\s*.*", "Depends: mobilesubstrate", s)
          else:
              s += "\nDepends: mobilesubstrate\n"

          p.write_text(s)
          PY

          echo "----- control -----"
          cat control

      - name: Build package
        run: |
          export THEOS="$THEOS"
          make clean package FINALPACKAGE=1

      - name: Inspect package output
        run: |
          ls -lah packages || true
          file packages/* || true

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: MultitaskingGestures-ios7-arm
          path: packages/*.deb
          if-no-files-found: error
